<p class="my-0"><strong>{{ item.product.name }}</strong></p>
<p class="my-0"><strong>Size: </strong>{% if item.product.has_sizes %}{{ item.size|upper }}{% else %}N/A{% endif %}</p>
<p class="my-0 small text-muted">Price Each: ${{ item.price_each|floatformat:2 }}</p>
<p class="my-0 small text-muted bag-item-sku">SKU: {{ item.product.sku|upper }}</p>
